<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowzint AI | Login</title>
    <!-- Route guard -->
    <script src="assets/js/guard.js"></script>
    
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Soft ambient background blobs -->
    <div class="ambient-bg">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-container glass-panel">
            
            <div class="auth-header">
                <div class="auth-logo-icon">
                    <i class="fa-solid fa-face-smile"></i>
                </div>
                <h1 class="auth-logo">flowzint</h1>
                <div class="auth-subtitle">Authenticate to access infrastructure.</div>
            </div>

            <div id="loginError" class="auth-error">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="errorText"></span>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Identity (Email)</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope input-icon-left"></i>
                        <input type="email" id="email" class="input-glass" required placeholder="agent@flowzint.ai">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Security Key (Password)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon-left"></i>
                        <input type="password" id="password" class="input-glass" required placeholder="••••••••">
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle Password Visibility">
                            <i class="fa-regular fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-controls">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember this device</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot key?</a>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    INITIALIZE SESSION <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 4px;"></i>
                </button>
            </form>

            <div class="auth-divider">SECURE NODE IDENTITY</div>

            <!-- Request identity card -->
            <div class="identity-card">
                <div class="identity-card-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div class="identity-card-text">
                    All session connections are fully encrypted and securely mediated via decentralized identity protocols.
                </div>
            </div>

            <div class="auth-footer">
                No access protocol? <a href="register.html">Request Identity</a>
            </div>
            
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const passwordInput = document.getElementById('password');
            const passwordToggle = document.getElementById('passwordToggle');
            const eyeIcon = document.getElementById('eyeIcon');
            
            // Password Show/Hide Toggle Logic
            passwordToggle.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    eyeIcon.classList.remove('fa-regular', 'fa-eye');
                    eyeIcon.classList.add('fa-regular', 'fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    eyeIcon.classList.remove('fa-regular', 'fa-eye-slash');
                    eyeIcon.classList.add('fa-regular', 'fa-eye');
                }
            });

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const btn = document.getElementById('loginBtn');
                const errorDiv = document.getElementById('loginError');
                const errorText = document.getElementById('errorText');
                
                btn.innerHTML = 'AUTHENTICATING... <i class="fa-solid fa-spinner fa-spin" style="margin-left: 4px;"></i>';
                btn.style.pointerEvents = 'none';
                errorDiv.style.display = 'none';

                try {
                    await Auth.login(email, password);
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    errorText.textContent = err.message || 'Identity mediation failed.';
                    errorDiv.style.display = 'flex';
                    btn.innerHTML = 'INITIALIZE SESSION <i class="fa-solid fa-arrow-right-to-bracket" style="margin-left: 4px;"></i>';
                    btn.style.pointerEvents = 'auto';
                }
            });
        });
    </script>
</body>
</html>
